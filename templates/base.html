{% load static %}
<!-- templates/base.html -->
<!doctype html> <!-- объявление типа документа -->
<html lang="ru"> <!-- язык страницы -->
  <head>
    <!-- мета-информация -->
    <meta charset="utf-8" /> <!-- кодировка -->
    <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- адаптивность -->
    <!-- блок для заголовка страницы, переопределяется дочерними шаблонами -->
    <title>{% block title %}Bookstore{% endblock %}</title>

    {% load static %} <!-- подключаем тэг static для построения URL к статике -->
    <!-- подключение основного CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
  </head>
  <body>
    <!-- шапка/навигация -->
    <header>
      <nav>
        <a href="{% url 'catalog-index' %}">Bookstore</a> <!-- ссылка на корень каталога -->
      </nav>
    </header>

    <!-- основной контент: дочерние шаблоны заполняют этот блок -->
    <main>
      {% block content %}{% endblock %}
    </main>

    <!-- подвал -->
    <footer>
      <p>© Bookstore</p>
    </footer>
  </body>
</html>
